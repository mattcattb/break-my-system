services:
  postgres:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-break_my_system}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-break_my_system}",
        ]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    build:
      context: ../go-redis
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "${REDIS_PORT:-26379}:6479"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD-SHELL", "nc -z 127.0.0.1 6479"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres-data:
  redis-data:
