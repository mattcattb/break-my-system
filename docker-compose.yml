services:
  postgres:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-break_my_system}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-break_my_system}",
        ]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    build:
      context: ./systems/go-redis
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "${REDIS_PORT:-26379}:6479"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD-SHELL", "nc -z 127.0.0.1 6479"]
      interval: 10s
      timeout: 5s
      retries: 5

  wad:
    build:
      context: ./systems/wad-filesystem
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "${WAD_PORT:-27373}:7373"
    volumes:
      - "${WAD_DATA_DIR:-/tmp/break-my-system/wads}:/data"
    healthcheck:
      test: ["CMD-SHELL", "nc -z 127.0.0.1 7373"]
      interval: 10s
      timeout: 5s
      retries: 5

  plc:
    image: mattbou12/plc-runtime:1.0.0
    restart: unless-stopped
    environment:
      PORT: 7474
    ports:
      - "${PLC_PORT:-27474}:7474"

  minesweeper:
    build:
      context: ./systems/minesweeper
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      MINESWEEPER_MODE: server
      MINESWEEPER_PORT: 7575
      MINESWEEPER_DATA_DIR: /data
      MINESWEEPER_LEADERBOARD_PATH: ${MINESWEEPER_LEADERBOARD_PATH:-/data/leaderboard.csv}
    volumes:
      - minesweeper-data:/data
    ports:
      - "${MINESWEEPER_PORT:-27575}:7575"

  api:
    profiles: ["production"]
    build:
      context: .
      dockerfile: packages/server/Dockerfile
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/${POSTGRES_DB:-break_my_system}
      REDIS_URL: redis://redis:6479
      MINESWEEPER_HOST: minesweeper
      MINESWEEPER_PORT: 7575
      WAD_HOST: 127.0.0.1
      WAD_PORT: 7373
      WAD_LISTEN_PORT: 7373
      WAD_DATA_DIR: /data/wads
      PLC_HOST: plc
      PLC_PORT: 7474
    ports:
      - "${API_PORT:-3000}:3000"
    volumes:
      - "${WAD_DATA_DIR:-/tmp/break-my-system/wads}:/data/wads"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      plc:
        condition: service_started
      minesweeper:
        condition: service_healthy

volumes:
  postgres-data:
  redis-data:
  minesweeper-data:
